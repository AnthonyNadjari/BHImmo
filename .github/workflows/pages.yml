name: GitHub Pages

# Publishes the app to GitHub Pages — https://<owner>.github.io/<repo>/ — in
# parallel with Vercel, as a redundant always-on URL. Uses the robust
# "deploy from a branch" method: it builds with the Pages base path and pushes
# the result to the `gh-pages` branch (no fragile Pages-deployment API).
#
# ONE-TIME setup: Settings → Pages → Source: "Deploy from a branch" →
# Branch: `gh-pages` → folder `/ (root)` → Save. Then it auto-updates forever.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Data pipeline"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: gh-pages-branch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build (base path = /<repo>/)
        working-directory: frontend
        env:
          PRER_BASE: /${{ github.event.repository.name }}/
        run: |
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: github pages"
