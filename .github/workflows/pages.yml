name: GitHub Pages

# Publishes the app to GitHub Pages — https://<owner>.github.io/<repo>/ —
# in parallel with Vercel and the githack (live branch) deployment, so there is
# always an up-to-date, independent URL. Auto-deploys on every push to main and
# after each data-pipeline run.
#
# `actions/configure-pages` with `enablement: true` turns Pages on automatically
# (source = GitHub Actions). If your org/account blocks that, enable it once via
# Settings → Pages → Source: "GitHub Actions", then re-run this workflow.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Data pipeline"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          PRER_BASE: ${{ steps.pages.outputs.base_path }}/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
