name: Deploy frontend to GitHub Pages

# Builds the static React app (bundling the latest committed dataset) and
# publishes it to GitHub Pages. Triggers on:
#   - pushes that touch the frontend or the dataset,
#   - completion of the data pipeline (so fresh data redeploys automatically),
#   - manual dispatch.
on:
  push:
    branches:
      - main
      - claude/paris-real-estate-radar-apil7n
    paths:
      - "frontend/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["Data pipeline"]
    types: [completed]
  workflow_dispatch:

# Allow one concurrent deployment; let a newer one supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # When triggered by the pipeline finishing, only deploy a successful run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deploy the exact commit the pipeline just produced (avoids serving
          # stale data on workflow_run-triggered deploys).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Enables GitHub Pages (GitHub Actions source) on first run and exposes
      # the correct base path for the Vite build.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          PRER_BASE: ${{ steps.pages.outputs.base_path }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
