name: Publish static site

# Builds the React app (bundling the latest committed dataset) and publishes
# it to the `live` branch, which is served as a static site by the raw.githack
# CDN at:
#   https://raw.githack.com/<owner>/<repo>/live/index.html
#
# This path needs only `contents: write` (no Pages-API permission), so it works
# without any repo admin action. For a GitHub Pages URL instead, enable
# Settings → Pages → Source: "Deploy from a branch" → live, or use Vercel
# (see README + vercel.json).
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["Data pipeline"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: publish-live
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # On a pipeline-triggered run, only publish a successful data refresh.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deploy the exact commit the pipeline produced (avoids stale data).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (base path matches the githack /<owner>/<repo>/live/ URL)
        working-directory: frontend
        env:
          PRER_BASE: /${{ github.repository }}/live/
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Publish to live branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: live
          force_orphan: true
          commit_message: "deploy: publish static site"
