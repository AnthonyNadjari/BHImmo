<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BHImmobilier radar">
  <rect width="32" height="32" rx="7" fill="#14130f"/>
  <g fill="none" stroke="#e0a44a" stroke-width="1.6" opacity="0.85">
    <circle cx="16" cy="16" r="4.2"/>
    <circle cx="16" cy="16" r="8" opacity="0.55"/>
    <circle cx="16" cy="16" r="11.6" opacity="0.3"/>
  </g>
  <!-- radar sweep -->
  <path d="M16 16 L16 3.5 A12.5 12.5 0 0 1 27 11 Z" fill="url(#sweep)"/>
  <line x1="16" y1="16" x2="27" y2="11" stroke="#f0bd6b" stroke-width="1.4" stroke-linecap="round"/>
  <!-- opportunity blip -->
  <circle cx="21.5" cy="10.5" r="2.4" fill="#3ecf8e"/>
  <circle cx="21.5" cy="10.5" r="2.4" fill="none" stroke="#3ecf8e" stroke-width="1.4" opacity="0.4">
    <animate attributeName="r" values="2.4;5;2.4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="16" r="1.6" fill="#e0a44a"/>
  <defs>
    <linearGradient id="sweep" x1="16" y1="16" x2="24" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0a44a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e0a44a" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
