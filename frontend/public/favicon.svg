<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="P.R.E.R radar">
  <rect width="32" height="32" rx="7" fill="#14182a"/>
  <g fill="none" stroke="#8b95ff" stroke-width="1.6" opacity="0.85">
    <circle cx="16" cy="16" r="4.2"/>
    <circle cx="16" cy="16" r="8" opacity="0.55"/>
    <circle cx="16" cy="16" r="11.6" opacity="0.3"/>
  </g>
  <!-- radar sweep -->
  <path d="M16 16 L16 3.5 A12.5 12.5 0 0 1 27 11 Z" fill="url(#sweep)"/>
  <line x1="16" y1="16" x2="27" y2="11" stroke="#aeb6ff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- opportunity blip -->
  <circle cx="21.5" cy="10.5" r="2.4" fill="#22c55e"/>
  <circle cx="21.5" cy="10.5" r="2.4" fill="none" stroke="#22c55e" stroke-width="1.4" opacity="0.4">
    <animate attributeName="r" values="2.4;5;2.4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="16" r="1.6" fill="#8b95ff"/>
  <defs>
    <linearGradient id="sweep" x1="16" y1="16" x2="24" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b95ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8b95ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
