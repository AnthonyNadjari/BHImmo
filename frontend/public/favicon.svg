<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BHImmobilier radar">
  <rect width="32" height="32" rx="7" fill="#0e1a2b"/>
  <g fill="none" stroke="#2563eb" stroke-width="1.6" opacity="0.9">
    <circle cx="16" cy="16" r="4.2"/>
    <circle cx="16" cy="16" r="8" opacity="0.55"/>
    <circle cx="16" cy="16" r="11.6" opacity="0.3"/>
  </g>
  <!-- radar sweep -->
  <path d="M16 16 L16 3.5 A12.5 12.5 0 0 1 27 11 Z" fill="url(#sweep)"/>
  <line x1="16" y1="16" x2="27" y2="11" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
  <!-- opportunity blip -->
  <circle cx="21.5" cy="10.5" r="2.4" fill="#14b8a6"/>
  <circle cx="21.5" cy="10.5" r="2.4" fill="none" stroke="#14b8a6" stroke-width="1.4" opacity="0.4">
    <animate attributeName="r" values="2.4;5;2.4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="16" r="1.6" fill="#2563eb"/>
  <defs>
    <linearGradient id="sweep" x1="16" y1="16" x2="24" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
